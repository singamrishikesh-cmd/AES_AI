<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Teacher | AES_ai</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Custom Style -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center text-white">

    <!-- Background Particles -->
    <div id="particles" class="fixed inset-0 pointer-events-none z-0"></div>

    <div class="max-w-lg w-full mx-4">
        <div class="glass rounded-3xl p-12">
            <!-- Header -->
            <div class="flex items-center gap-4 mb-10">
                <div class="w-12 h-12 bg-gradient-to-br from-violet-400 to-cyan-400 rounded-2xl flex items-center justify-center text-3xl">
                    👨‍🏫
                </div>
                <div>
                    <h1 class="text-4xl font-bold tracking-tighter">Update Teacher</h1>
                    <p class="text-white/60">Edit teacher account details</p>
                </div>
            </div>

            <form action="{{ url_for('update_teacher', teacher_id=teacher_id) }}" method="POST" class="space-y-8">
                <div>
                    <label class="block text-sm font-medium text-white/70 mb-3">Username</label>
                    <input type="text" 
                           name="username" 
                           value="{{ teacher[1] }}" 
                           required
                           class="w-full px-7 py-6 glass rounded-3xl focus:outline-none focus:ring-2 focus:ring-cyan-400 text-white placeholder:text-white/50">
                </div>

                <div>
                    <label class="block text-sm font-medium text-white/70 mb-3">Password</label>
                    <input type="password" 
                           name="password" 
                           value="{{ teacher[2] }}" 
                           required
                           class="w-full px-7 py-6 glass rounded-3xl focus:outline-none focus:ring-2 focus:ring-cyan-400 text-white placeholder:text-white/50">
                </div>

                <div class="flex gap-4 pt-6">
                    <a href="{{ url_for('admin_teachers') }}" 
                       class="flex-1 py-6 text-center border border-white/30 hover:border-white/50 rounded-3xl font-medium transition">
                        Cancel
                    </a>
                    <button type="submit" 
                            class="flex-1 py-6 bg-gradient-to-r from-cyan-400 to-violet-500 text-slate-950 font-semibold rounded-3xl hover:scale-105 transition-all">
                        Save Changes
                    </button>
                </div>
            </form>
        </div>

        <!-- Back Link -->
        <div class="text-center mt-8">
            <a href="{{ url_for('admin_teachers') }}" 
               class="inline-flex items-center gap-2 text-white/60 hover:text-cyan-400 transition">
                <i class="fa-solid fa-arrow-left"></i>
                <span>Back to Teachers List</span>
            </a>
        </div>
    </div>

    <script>
        // Floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.width = p.style.height = (Math.random() * 6 + 3) + 'px';
                p.style.animationDuration = (Math.random() * 40 + 25) + 's';
                p.style.animationDelay = '-' + Math.random() * 50 + 's';
                container.appendChild(p);
            }
        }
        createParticles();
    </script>
</body>
</html>
