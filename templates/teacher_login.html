<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Login | AES_AI</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Custom Style -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
        }
        
        .login-card {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .cover-img {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), 
                        url("{{ url_for('static', filename='images/logo1animate.gif') }}") center/cover;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center text-white relative overflow-hidden">

    <!-- Background Particles -->
    <div id="particles" class="fixed inset-0 pointer-events-none z-0"></div>

    <div class="max-w-4xl w-full mx-4">
        <div class="grid md:grid-cols-5 login-card rounded-3xl overflow-hidden shadow-2xl">
            
            <!-- Left Side - Visual Cover -->
            <div class="md:col-span-2 cover-img h-96 md:h-full flex items-center justify-center p-10 relative">
                <div class="text-center z-10">
                    <div class="w-20 h-20 mx-auto mb-6 bg-white/10 backdrop-blur-xl rounded-2xl flex items-center justify-center text-5xl">
                        👨‍🏫
                    </div>
                    <h2 class="text-4xl font-bold tracking-tighter neon-cyan mb-3">Teacher Portal</h2>
                    <p class="text-white/70 max-w-xs mx-auto">
                        Evaluate answers with AI precision
                    </p>
                </div>
                
                <!-- Subtle overlay gradient -->
                <div class="absolute inset-0 bg-gradient-to-br from-cyan-500/10 to-transparent"></div>
            </div>

            <!-- Right Side - Login Form -->
            <div class="md:col-span-3 p-12 md:p-16 flex flex-col justify-center">
                <div class="mb-10">
                    <h1 class="text-4xl font-bold tracking-tighter">Welcome Back</h1>
                    <p class="text-white/60 mt-2">Sign in to access your teaching dashboard</p>
                </div>

                <form method="POST" action="{{ url_for('teacher_login') }}" class="space-y-8">
                    <div>
                        <label class="block text-sm font-medium text-white/70 mb-2">Username</label>
                        <div class="relative">
                            <div class="absolute left-5 top-1/2 -translate-y-1/2 text-cyan-400">
                                <i class="fa-solid fa-user"></i>
                            </div>
                            <input type="text" 
                                   name="username" 
                                   placeholder="Enter your username" 
                                   required
                                   class="w-full pl-12 pr-6 py-5 glass rounded-3xl focus:outline-none focus:ring-2 focus:ring-cyan-400 text-white placeholder:text-white/50">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-white/70 mb-2">Password</label>
                        <div class="relative">
                            <div class="absolute left-5 top-1/2 -translate-y-1/2 text-cyan-400">
                                <i class="fa-solid fa-lock"></i>
                            </div>
                            <input type="password" 
                                   name="password" 
                                   placeholder="Enter your password" 
                                   required
                                   class="w-full pl-12 pr-6 py-5 glass rounded-3xl focus:outline-none focus:ring-2 focus:ring-cyan-400 text-white placeholder:text-white/50">
                        </div>
                    </div>

                    {% if error %}
                    <div class="bg-red-500/10 border border-red-500/30 text-red-400 px-6 py-4 rounded-2xl text-sm">
                        {{ error }}
                    </div>
                    {% endif %}

                    <button type="submit" 
                            class="neon-btn w-full py-6 bg-gradient-to-r from-cyan-400 to-emerald-400 text-slate-950 font-semibold text-lg rounded-3xl hover:scale-105 transition-all flex items-center justify-center gap-3">
                        <span>Login as Teacher</span>
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </form>

                <div class="mt-8 text-center text-white/50 text-sm">
                    Don't have an account? Contact your administrator.
                </div>
            </div>
        </div>
    </div>

    <script>
        // Floating particles for login background
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.width = p.style.height = (Math.random() * 6 + 3) + 'px';
                p.style.animationDuration = (Math.random() * 40 + 25) + 's';
                p.style.animationDelay = '-' + Math.random() * 50 + 's';
                container.appendChild(p);
            }
        }
        createParticles();
    </script>
</body>
</html>
