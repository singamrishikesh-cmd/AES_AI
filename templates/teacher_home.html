<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard | AES_ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
            font-family: 'Inter', system-ui, sans-serif;
        }
        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }
        .neon-cyan {
            text-shadow: 0 0 25px #22d3ee;
        }
        .card-hover {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-hover:hover {
            transform: translateY(-12px);
            box-shadow: 0 0 40px rgba(34, 211, 238, 0.25);
        }

        /* Hide Scrollbars */
        ::-webkit-scrollbar { display: none; }
        html { scrollbar-width: none; }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="min-h-screen text-white relative">

    <nav class="glass border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-8 py-5 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-emerald-400 rounded-2xl flex items-center justify-center text-2xl">👨‍🏫</div>
                <h1 class="text-3xl font-bold tracking-tighter neon-cyan">AES_ai</h1>
            </div>
            <div class="flex items-center gap-8 text-sm font-medium">
                <a href="{{ url_for('teacher_home') }}" class="text-emerald-400 font-semibold">Dashboard</a>
                <a href="{{ url_for('teacher_view_score') }}" class="hover:text-cyan-400 transition">Scores</a>
                <a href="{{ url_for('teacher_view_uploaded_sheets') }}" class="hover:text-cyan-400 transition">Uploaded Sheets</a>
                <a href="{{ url_for('teacher_logout') }}" class="text-red-400 hover:text-red-500 transition">Logout</a>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-8 py-16">
        <div class="flex justify-between items-end mb-12">
            <div>
                <h1 class="text-6xl font-bold tracking-tighter">Welcome, Teacher</h1>
                <p class="text-xl text-white/60 mt-3">Manage your tests and evaluations with AI precision</p>
            </div>
            <div class="text-right">
                <div class="text-sm text-white/50">Total Tests</div>
                <div class="text-5xl font-bold text-emerald-400">{{ tests|length }}</div>
            </div>
        </div>

        <!-- Create New Test -->
        <div class="glass rounded-3xl p-10 mb-12">
            <h2 class="text-2xl font-semibold mb-8 flex items-center gap-3">
                <i class="fa-solid fa-plus"></i> Create New Test
            </h2>
            <form method="POST" action="{{ url_for('teacher_home') }}" class="flex flex-wrap gap-6">
                <input type="text" name="test_name" placeholder="Test Name (e.g. Midterm Physics)" required
                       class="flex-1 min-w-[300px] px-8 py-6 glass rounded-3xl focus:outline-none focus:ring-2 focus:ring-cyan-400 text-white placeholder:text-white/50">

                <input type="number" name="total_marks" placeholder="Total Marks" min="1" required
                       class="w-52 px-8 py-6 glass rounded-3xl focus:outline-none focus:ring-2 focus:ring-cyan-400 text-white">

                <button type="submit" name="add_test_name"
                        class="px-12 py-6 bg-gradient-to-r from-cyan-400 to-emerald-400 text-slate-950 font-bold rounded-3xl hover:scale-105 transition-all">
                    Create Test
                </button>
            </form>
        </div>

        <!-- Your Tests -->
        <h2 class="text-3xl font-semibold mb-8 flex items-center gap-3">
            <i class="fa-solid fa-book"></i> Your Tests
        </h2>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            {% for test in tests %}
            <div class="glass rounded-3xl p-8 card-hover group">
                <div class="flex justify-between items-start mb-8">
                    <h3 class="text-2xl font-semibold group-hover:text-cyan-400 transition-colors">{{ test[1] }}</h3>
                    <span class="text-xs bg-white/10 px-4 py-2 rounded-full">{{ test[0] }}</span>
                </div>
                <div class="flex flex-wrap gap-3">
                    <a href="{{ url_for('view_teacher_test_questions', test_id=test[0]) }}" class="flex-1 text-center py-4 rounded-3xl border border-cyan-400 hover:bg-cyan-400 hover:text-slate-950 transition-all text-sm font-medium">Manage Questions</a>
                    <a href="{{ url_for('upload_model_key', test_id=test[0]) }}" class="flex-1 text-center py-4 rounded-3xl border border-emerald-400 hover:bg-emerald-400 hover:text-slate-950 transition-all text-sm font-medium">Upload Key</a>
                    <a href="{{ url_for('teacher_upload_answer_sheet', test_id=test[0]) }}" class="flex-1 text-center py-4 rounded-3xl border border-violet-400 hover:bg-violet-400 hover:text-slate-950 transition-all text-sm font-medium">Upload Sheets</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
