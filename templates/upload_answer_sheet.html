<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Answer Sheet | AES_AI</title>
   
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
   
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
   
    <style>
        /* Hide all scrollbars but keep scrolling */
::-webkit-scrollbar {
    display: none;
}
html {
    scrollbar-width: none; /* Firefox */
}
html::-webkit-scrollbar {
    display: none;
}

/* Hide number input spin buttons */
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
}
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
        }
       
        .drop-zone {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
       
        .drop-zone.dragover {
            background: rgba(34, 211, 238, 0.15);
            border-color: #22d3ee;
            transform: scale(1.03);
        }

        /* Hide scrollbars */
        ::-webkit-scrollbar {
            display: none;
        }
        html {
            scrollbar-width: none;
        }
    </style>
</head>
<body class="min-h-screen text-white flex items-center justify-center relative">
    <!-- Background Particles -->
    <div id="particles" class="fixed inset-0 pointer-events-none z-0"></div>

    <div class="max-w-lg w-full mx-4">
        <div class="glass rounded-3xl p-10 text-center bg-slate-900/80 backdrop-blur-xl border border-white/10">
            
            <!-- Header -->
            <div class="mb-10">
                <div class="w-20 h-20 mx-auto mb-6 bg-gradient-to-br from-cyan-400 to-violet-500 rounded-3xl flex items-center justify-center text-5xl shadow-lg">
                    📤
                </div>
                <h1 class="text-4xl font-bold tracking-tighter mb-3">Upload Answer Sheet</h1>
                <p class="text-white/60">Test ID: <span class="font-mono text-cyan-400">29</span></p>
            </div>

            <form method="POST" enctype="multipart/form-data" class="space-y-8">
                
                <!-- Student Selection -->
                <div>
                    <label class="block text-white/70 mb-3 text-sm font-medium text-left">Select Student</label>
                    
                    <div class="relative">
                        <!-- Selected Student -->
                        <div id="selected-display" 
                             class="bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded-2xl p-4 cursor-pointer transition-all flex items-center justify-between"
                             onclick="toggleDropdown()">
                            <span id="selected-student" class="text-white font-medium">Rishikesh</span>
                            <i class="fa-solid fa-chevron-down text-cyan-400 transition-transform duration-200" id="chevron"></i>
                        </div>

                        <!-- Dropdown -->
                        <div id="student-dropdown" 
                             class="hidden absolute w-full mt-2 bg-slate-800 border border-slate-600 rounded-2xl overflow-hidden shadow-2xl z-50 py-2 max-h-60 overflow-y-auto">
                            <div onclick="selectStudent(this)" class="px-5 py-3 hover:bg-slate-700 cursor-pointer text-white">Rishikesh</div>
                            <div onclick="selectStudent(this)" class="px-5 py-3 hover:bg-slate-700 cursor-pointer text-white">Priya Sharma</div>
                            <div onclick="selectStudent(this)" class="px-5 py-3 hover:bg-slate-700 cursor-pointer text-white">Aarav Patel</div>
                            <div onclick="selectStudent(this)" class="px-5 py-3 hover:bg-slate-700 cursor-pointer text-white">Sneha Reddy</div>
                            <div onclick="selectStudent(this)" class="px-5 py-3 hover:bg-slate-700 cursor-pointer text-white">Rahul Verma</div>
                        </div>
                    </div>
                </div>

                <!-- File Upload -->
                <div>
                    <label class="block text-white/70 mb-4 text-sm font-medium text-left">Answer Sheet File</label>
                    
                    <div id="drop-zone"
                         class="drop-zone border-3 border-dashed border-white/30 rounded-3xl p-16 cursor-pointer hover:border-cyan-400 transition-all"
                         ondragover="handleDragOver(event)"
                         ondragleave="handleDragLeave(event)"
                         ondrop="handleDrop(event)">
                       
                        <i class="fa-solid fa-cloud-arrow-up text-6xl text-cyan-400 mb-6"></i>
                        <p class="text-lg font-medium mb-2">Drag & drop your file here</p>
                        <p class="text-white/50 text-sm mb-8">or click to browse</p>
                       
                        <label class="cursor-pointer inline-block px-10 py-4 bg-white/10 hover:bg-cyan-400 hover:text-slate-950 rounded-3xl text-sm font-medium transition">
                            Choose File
                            <input type="file"
                                   name="file"
                                   accept=".pdf,.png,.jpg,.jpeg,.txt"
                                   required
                                   class="hidden"
                                   onchange="handleFileSelect(this)">
                        </label>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit"
                        class="neon-btn w-full py-7 bg-gradient-to-r from-cyan-400 to-emerald-400 text-slate-950 font-semibold text-xl rounded-3xl hover:scale-105 transition-all flex items-center justify-center gap-3 shadow-lg">
                    <span>Upload & Submit</span>
                    <i class="fa-solid fa-arrow-up"></i>
                </button>
            </form>

            <!-- Back Link -->
            <div class="mt-10">
                <a href="#" 
                   class="inline-flex items-center gap-3 text-white/60 hover:text-cyan-400 transition text-sm">
                    <i class="fa-solid fa-arrow-left"></i>
                    <span>Back to Dashboard</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        // Floating Particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.className = 'particle absolute bg-cyan-400/30 rounded-full';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 100 + '%';
                p.style.width = p.style.height = (Math.random() * 5 + 2) + 'px';
                p.style.animation = `float ${Math.random() * 30 + 25}s linear infinite`;
                p.style.animationDelay = '-' + Math.random() * 50 + 's';
                container.appendChild(p);
            }
        }
        createParticles();

        // Drag & Drop Functions
        function handleDragOver(e) {
            e.preventDefault();
            document.getElementById('drop-zone').classList.add('dragover');
        }
        function handleDragLeave(e) {
            e.preventDefault();
            document.getElementById('drop-zone').classList.remove('dragover');
        }
        function handleDrop(e) {
            e.preventDefault();
            document.getElementById('drop-zone').classList.remove('dragover');
            console.log('File dropped:', e.dataTransfer.files[0]?.name);
        }
        function handleFileSelect(input) {
            if (input.files.length > 0) {
                console.log('File selected:', input.files[0].name);
            }
        }

        // Student Dropdown Functions
        function toggleDropdown() {
            const dropdown = document.getElementById('student-dropdown');
            const chevron = document.getElementById('chevron');
            
            dropdown.classList.toggle('hidden');
            chevron.style.transform = dropdown.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
        }

        function selectStudent(element) {
            document.getElementById('selected-student').textContent = element.textContent;
            document.getElementById('student-dropdown').classList.add('hidden');
            document.getElementById('chevron').style.transform = 'rotate(0deg)';
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', function(e) {
            const display = document.getElementById('selected-display');
            if (!display.contains(e.target)) {
                document.getElementById('student-dropdown').classList.add('hidden');
                document.getElementById('chevron').style.transform = 'rotate(0deg)';
            }
        });
    </script>
</body>
</html>
