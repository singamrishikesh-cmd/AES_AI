<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Model Answer Key | AES_AI</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Custom Style -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
        }
        
        .drop-zone {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .drop-zone.dragover {
            background: rgba(34, 211, 238, 0.15);
            border-color: #22d3ee;
            transform: scale(1.03);
        }
    </style>
</head>
<body class="min-h-screen text-white flex items-center justify-center relative">

    <!-- Background Particles -->
    <div id="particles" class="fixed inset-0 pointer-events-none z-0"></div>

    <div class="max-w-lg w-full mx-4">
        <div class="glass rounded-3xl p-12 text-center">
            <!-- Header -->
            <div class="mb-10">
                <div class="w-20 h-20 mx-auto mb-6 bg-gradient-to-br from-emerald-400 to-cyan-400 rounded-3xl flex items-center justify-center text-5xl">
                    🔑
                </div>
                <h1 class="text-4xl font-bold tracking-tighter mb-3">Upload Model Answer Key</h1>
                <p class="text-white/60">Test ID: <span class="font-mono text-cyan-400">{{ test_id }}</span></p>
            </div>

            <form method="POST" enctype="multipart/form-data" class="space-y-10">
                <div>
                    <label class="block text-white/70 mb-4">Select the model answer key file</label>
                    
                    <div id="drop-zone" 
                         class="drop-zone border-3 border-dashed border-white/30 rounded-3xl p-16 cursor-pointer hover:border-cyan-400 transition-all"
                         ondragover="handleDragOver(event)" 
                         ondragleave="handleDragLeave(event)" 
                         ondrop="handleDrop(event)">
                        
                        <i class="fa-solid fa-key text-6xl text-emerald-400 mb-6"></i>
                        <p class="text-lg font-medium mb-2">Drag & drop your answer key here</p>
                        <p class="text-white/50 text-sm mb-8">Supported: PDF, TXT, Images</p>
                        
                        <label class="cursor-pointer inline-block px-10 py-4 bg-white/10 hover:bg-emerald-400 hover:text-slate-950 rounded-3xl text-sm font-medium transition">
                            Choose File
                            <input type="file" 
                                   name="file" 
                                   accept=".pdf,.txt,.png,.jpg,.jpeg" 
                                   required 
                                   class="hidden" 
                                   onchange="handleFileSelect(this)">
                        </label>
                    </div>
                </div>

                <button type="submit" 
                        class="neon-btn w-full py-7 bg-gradient-to-r from-emerald-400 to-cyan-400 text-slate-950 font-semibold text-xl rounded-3xl hover:scale-105 transition-all flex items-center justify-center gap-3">
                    <span>Upload Model Key</span>
                    <i class="fa-solid fa-arrow-up"></i>
                </button>
            </form>

            <div class="mt-10">
                <a href="{{ url_for('teacher_home') }}" 
                   class="inline-flex items-center gap-3 text-white/60 hover:text-cyan-400 transition text-sm">
                    <i class="fa-solid fa-arrow-left"></i>
                    <span>Back to Teacher Dashboard</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        // Floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.width = p.style.height = (Math.random() * 6 + 3) + 'px';
                p.style.animationDuration = (Math.random() * 45 + 30) + 's';
                p.style.animationDelay = '-' + Math.random() * 50 + 's';
                container.appendChild(p);
            }
        }
        createParticles();

        // Drag and Drop Handlers
        function handleDragOver(e) {
            e.preventDefault();
            document.getElementById('drop-zone').classList.add('dragover');
        }

        function handleDragLeave(e) {
            e.preventDefault();
            document.getElementById('drop-zone').classList.remove('dragover');
        }

        function handleDrop(e) {
            e.preventDefault();
            const dropZone = document.getElementById('drop-zone');
            dropZone.classList.remove('dragover');
            
            const file = e.dataTransfer.files[0];
            if (file) {
                console.log('File dropped:', file.name);
            }
        }

        function handleFileSelect(input) {
            if (input.files.length > 0) {
                console.log('File selected:', input.files[0].name);
            }
        }
    </script>
</body>
</html>
