<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take Test | AES_AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
            font-family: 'Inter', system-ui, sans-serif;
        }
        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }
        .neon-cyan {
            text-shadow: 0 0 25px #22d3ee;
        }
        .question-card {
            transition: all 0.4s ease;
        }
        .question-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 0 40px rgba(34, 211, 238, 0.2);
        }
        .answer-input {
            transition: all 0.3s ease;
        }
        .answer-input:focus {
            box-shadow: 0 0 0 4px rgba(34, 211, 238, 0.3);
            border-color: #22d3ee;
        }
    </style>
</head>
<body class="min-h-screen text-white">

    <!-- Background Particles -->
    <div class="fixed inset-0 pointer-events-none bg-[radial-gradient(#22d3ee_1px,transparent_1px)] [background-size:50px_50px] opacity-10"></div>

    <!-- Navbar -->
    <nav class="glass border-b border-white/10 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-8 py-5 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-emerald-400 rounded-2xl flex items-center justify-center text-2xl">🎓</div>
                <h1 class="text-3xl font-bold tracking-tighter neon-cyan">AES_AI</h1>
            </div>
            <div class="flex gap-8 text-sm font-medium">
                <a href="{{ url_for('student_home') }}" class="hover:text-cyan-400 transition">Home</a>
                <a href="{{ url_for('student_take_test') }}" class="hover:text-cyan-400 transition">Tests</a>
                <a href="{{ url_for('student_logout') }}" class="hover:text-red-400 transition">Logout</a>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-8 py-16">
        <div class="flex items-center justify-between mb-12">
            <h1 class="text-5xl font-bold tracking-tighter">Test Questions</h1>
            <div class="text-white/60">
                Answer all questions • AI will evaluate instantly
            </div>
        </div>

        <form method="POST" action="#" class="space-y-10">
            {% for question in questions %}
            <div class="question-card glass rounded-3xl p-10">
                <div class="flex gap-6">
                    <div class="flex-shrink-0 w-12 h-12 bg-cyan-400/10 text-cyan-400 rounded-2xl flex items-center justify-center font-bold text-xl">
                        Q{{ question[0] }}
                    </div>
                    <div class="flex-1">
                        <h3 class="text-xl font-semibold leading-relaxed mb-8">
                            {{ question[1] }}
                        </h3>
                        
                        <div>
                            <label class="block text-sm text-white/70 mb-3">Your Answer</label>
                            <input 
                                type="text" 
                                name="question_{{ question[0] }}" 
                                required
                                class="answer-input glass w-full px-8 py-6 rounded-3xl text-white placeholder:text-white/40 focus:outline-none border border-white/20"
                                placeholder="Type your detailed answer here...">
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}

            <!-- Submit Button -->
            <div class="pt-8">
                <button type="submit" 
                        class="w-full py-7 bg-gradient-to-r from-cyan-400 to-emerald-400 text-slate-950 font-bold text-xl rounded-3xl hover:brightness-110 transition-all flex items-center justify-center gap-4 group">
                    <span>Submit Answers for AI Evaluation</span>
                    <i class="fa-solid fa-arrow-right group-active:translate-x-2 transition"></i>
                </button>
            </div>
        </form>
    </div>

</body>
</html>
